<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nextday</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-color: #0F172A;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --accent: #38BDF8;
      --accent-hover: #0EA5E9;
      --danger: #EF4444;
      --success: #10B981;
      --glass-blur: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      line-height: 1.5;
    }

    #app {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glassmorphic Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -10px rgba(0,0,0,0.6);
    }

    /* Navigation Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .nav-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }
    .nav-btn:active {
      transform: scale(0.98);
    }

    h1.date-title {
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      flex-grow: 1;
      background: -webkit-linear-gradient(45deg, #38BDF8, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Weather Widget */
    .weather {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .weather-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }
    .weather-temps {
      display: flex;
      flex-direction: column;
    }
    .temp-high { font-size: 1.5rem; font-weight: 700; }
    .temp-low { color: var(--text-muted); font-size: 0.9rem; }
    .weather-details {
      display: flex;
      gap: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .w-detail {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .weather-hourly {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
      justify-content: space-around;
    }
    .hourly-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hourly-time { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .hourly-icon { font-size: 1.25rem; }
    .hourly-temp { font-weight: 600; font-size: 0.95rem; }

    /* Section Titles */
    h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::after {
      content: '';
      flex-grow: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* Lists */
    ul { list-style: none; }
    li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    li:last-child { border-bottom: none; padding-bottom: 0; }
    
    /* Calendar */
    .event {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .event-time {
      font-weight: 600;
      color: var(--accent);
      width: 60px;
      flex-shrink: 0;
    }
    .event-details { flex-grow: 1; }
    .event-title { font-weight: 500; }
    .event-duration { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px;}

    /* Kids Section */
    .kid-block {
      margin-bottom: 24px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 16px;
    }
    .kid-block:last-child { margin-bottom: 0; }
    .kid-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #A78BFA;
      margin-bottom: 12px;
    }
    
    .data-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .data-label {
      width: 80px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .data-content { flex-grow: 1; }
    .data-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .subject-tag {
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* Utilities */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      color: var(--text-muted);
      gap: 16px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-inline {
      color: var(--danger);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 8px;
    }
    .error-full {
      text-align: center;
      padding: 40px;
    }
    .btn-retry {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      margin-top: 16px;
      cursor: pointer;
    }

    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.9rem;
      padding: 8px 0;
    }
    /* Settings Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-title { font-size: 1.5rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; }

    .settings-group { margin-bottom: 24px; }
    .settings-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
    
    .input-group { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type="text"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      flex-grow: 1;
      font-family: inherit;
    }
    
    .student-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255,255,255,0.1);
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); }

    .widget-order-item {
      background: rgba(255,255,255,0.05);
      margin-bottom: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-btns { display: flex; gap: 4px; }
    .order-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .save-bar {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 16px;
      font-weight: 700;
      flex-grow: 1;
      cursor: pointer;
    }

    .theme-picker {
      display: flex;
      gap: 12px;
    }
    .theme-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .theme-dot.active { border-color: #fff; }
  </style>
</head>
<body>

  <div id="app">
    <header>
      <button class="nav-btn" onclick="navigate(-1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="date-title" id="dateTitle">LOADING...</h1>
      <button class="nav-btn" onclick="navigate(1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="nav-btn" onclick="toggleSettings(true)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </header>

    <div id="content">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Settings</div>
        <button class="close-btn" onclick="toggleSettings(false)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="settings-group">
        <label class="settings-label">Calendars (emails, comma separated)</label>
        <div class="input-group">
          <input type="text" id="calendarInput" placeholder="primary, work@company.com">
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Students Visibility</label>
        <div id="studentList">
          <!-- Populated from /api/meta -->
          <div class="empty-state">Loading students...</div>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Layout Order</label>
        <div id="widgetList">
          <!-- draggable items -->
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Accent Color</label>
        <div class="theme-picker">
          <div class="theme-dot" style="background:#38BDF8" onclick="setAccent('#38BDF8')" data-color="#38BDF8"></div>
          <div class="theme-dot" style="background:#A78BFA" onclick="setAccent('#A78BFA')" data-color="#A78BFA"></div>
          <div class="theme-dot" style="background:#F472B6" onclick="setAccent('#F472B6')" data-color="#F472B6"></div>
          <div class="theme-dot" style="background:#34D399" onclick="setAccent('#34D399')" data-color="#34D399"></div>
          <div class="theme-dot" style="background:#FB923C" onclick="setAccent('#FB923C')" data-color="#FB923C"></div>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Global Credentials (Overrides .env)</label>
        <div style="background:rgba(0,0,0,0.2); padding:16px; border-radius:16px; display:flex; flex-direction:column; gap:12px;">
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Wilma Base URL</label>
            <input type="text" id="wilmaBaseUrl" placeholder="https://pirkkala.inschool.fi">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Wilma Username</label>
            <input type="text" id="wilmaUser" placeholder="email@example.com">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Wilma Password</label>
            <input type="password" id="wilmaPass" style="background:rgba(255,255,255,0.05); border:1px solid var(--card-border); border-radius:12px; padding:12px; color:#fff; width:100%;">
          </div>
          <hr style="border:0; border-top:1px solid var(--card-border); margin:8px 0;">
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Google Client ID</label>
            <input type="text" id="googleId">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Google Client Secret</label>
            <input type="text" id="googleSecret">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;">Google Refresh Token</label>
            <input type="text" id="googleToken">
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn-primary" onclick="saveSettings()">Save Configuration</button>
      </div>
    </div>
  </div>

  <script>
    let currentDate = readDateFromHash() || getTomorrow();
    let refreshInterval = null;
    let config = {
      calendarIds: [],
      enabledStudents: [],
      widgetOrder: ['weather', 'kids', 'calendar'],
      accentColor: '#38BDF8'
    };
    let meta = { students: [] };

    function readDateFromHash() {
      const h = location.hash.slice(1);
      const datePart = h.split('?')[0];
      return /^\d{4}-\d{2}-\d{2}$/.test(datePart) ? datePart : null;
    }

    function getTomorrow() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.toISOString().slice(0, 10);
    }

    function getToday() {
      const d = new Date();
      return d.toISOString().slice(0, 10);
    }

    function navigate(offset) {
      const d = new Date(currentDate + 'T12:00:00');
      d.setDate(d.getDate() + offset);
      currentDate = d.toISOString().slice(0, 10);
      location.hash = currentDate;
    }

    window.addEventListener('hashchange', () => {
      currentDate = readDateFromHash() || getTomorrow();
      loadDay();
    });

    window.onerror = function(msg, url, line, col, error) {
      showError(`UI Error: ${msg} at line ${line}`);
      return false;
    };

    async function fetchConfig() {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const newConfig = await res.json();
        // Merge with defaults to ensure all fields exist
        config = { ...config, ...newConfig };
        applyAccent(config.accentColor);
      } catch (e) {
        console.error('Failed to fetch config', e);
        // Don't throw, just use defaults
      }
    }

    async function fetchMeta() {
      try {
        const res = await fetch('/api/meta');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        meta = await res.json();
      } catch (e) {
        console.error('Failed to fetch meta', e);
      }
    }

    function toggleSettings(show) {
      const modal = document.getElementById('settingsModal');
      modal.style.display = show ? 'flex' : 'none';
      if (show) {
        populateSettings();
      }
    }

    function populateSettings() {
      document.getElementById('calendarInput').value = config.calendarIds.join(', ');
      
      const studentList = document.getElementById('studentList');
      if (meta.students.length === 0) {
        studentList.innerHTML = `<div class="empty-state">${config.wilma?.username ? 'Wait for student list...' : 'Configure Wilma first.'}</div>`;
      } else {
        studentList.innerHTML = meta.students.map(name => `
          <div class="student-item">
            <span>${name}</span>
            <label class="switch">
              <input type="checkbox" class="student-toggle" value="${name}" ${config.enabledStudents.includes(name) ? 'checked' : ''}>
              <span class="slider"></span>
            </label>
          </div>
        `).join('');
      }

      // Populate credentials
      document.getElementById('wilmaBaseUrl').value = config.wilma?.baseUrl || '';
      document.getElementById('wilmaUser').value = config.wilma?.username || '';
      document.getElementById('wilmaPass').value = config.wilma?.password || '';
      document.getElementById('googleId').value = config.google?.clientId || '';
      document.getElementById('googleSecret').value = config.google?.clientSecret || '';
      document.getElementById('googleToken').value = config.google?.refreshToken || '';

      renderWidgetOrder();
      
      // Mark active theme
      document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.color === config.accentColor);
      });
    }

    function renderWidgetOrder() {
      const list = document.getElementById('widgetList');
      list.innerHTML = config.widgetOrder.map((id, index) => `
        <div class="widget-order-item">
          <span>${id.charAt(0).toUpperCase() + id.slice(1)}</span>
          <div class="order-btns">
            <button class="order-btn" onclick="moveWidget(${index}, -1)" ${index === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
            <button class="order-btn" onclick="moveWidget(${index}, 1)" ${index === config.widgetOrder.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
          </div>
        </div>
      `).join('');
    }

    function moveWidget(index, direction) {
      const newOrder = [...config.widgetOrder];
      const targetIndex = index + direction;
      [newOrder[index], newOrder[targetIndex]] = [newOrder[targetIndex], newOrder[index]];
      config.widgetOrder = newOrder;
      renderWidgetOrder();
    }

    function setAccent(color) {
      config.accentColor = color;
      applyAccent(color);
      document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.color === color);
      });
    }

    function applyAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
    }

    async function saveSettings() {
      const calendarInput = document.getElementById('calendarInput').value;
      config.calendarIds = calendarInput.split(',').map(s => s.trim()).filter(s => s.length > 0);
      
      const studentToggles = document.querySelectorAll('.student-toggle');
      config.enabledStudents = Array.from(studentToggles)
        .filter(t => t.checked)
        .map(t => t.value);

      // Collect credentials
      config.wilma = {
        baseUrl: document.getElementById('wilmaBaseUrl').value || undefined,
        username: document.getElementById('wilmaUser').value || undefined,
        password: document.getElementById('wilmaPass').value || undefined
      };
      config.google = {
        clientId: document.getElementById('googleId').value || undefined,
        clientSecret: document.getElementById('googleSecret').value || undefined,
        refreshToken: document.getElementById('googleToken').value || undefined
      };

      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        if (res.ok) {
          toggleSettings(false);
          loadDay();
        }
      } catch (e) {
        alert('Failed to save settings');
      }
    }

    function weatherIcon(wmoCode) {
      if (wmoCode === 0) return '☀️';
      if (wmoCode <= 2) return '🌤';
      if (wmoCode === 3) return '☁️';
      if (wmoCode <= 48) return '🌫';
      if (wmoCode <= 67) return '🌧';
      if (wmoCode <= 77) return '❄️';
      if (wmoCode <= 82) return '🌦';
      if (wmoCode <= 86) return '🌨';
      return '⛈';
    }

    function formatDateTitle(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const today = getToday();
      const tomorrow = getTomorrow();
      
      let prefix = '';
      if (dateStr === today) prefix = 'TODAY • ';
      else if (dateStr === tomorrow) prefix = 'TOMORROW • ';

      const options = { weekday: 'long', day: 'numeric', month: 'short' };
      return prefix + d.toLocaleDateString('en-GB', options).toUpperCase();
    }

    function renderWeather(weather) {
      if (!weather || weather.error) {
        return `<div class="card"><div class="error-inline">☁️ Weather unavailable: ${weather?.message || 'Unknown error'}</div></div>`;
      }

      const hourlyHtml = weather.hourly ? `
        <div class="weather-hourly">
          ${weather.hourly.map(h => `
            <div class="hourly-point">
              <span class="hourly-time">${h.time}</span>
              <span class="hourly-icon">${weatherIcon(h.wmoCode)}</span>
              <span class="hourly-temp">${Math.round(h.temp)}°</span>
            </div>
          `).join('')}
        </div>
      ` : '';

      return `
        <div class="card weather-card">
          <div class="weather">
            <div class="weather-main">
              <div class="weather-icon">${weatherIcon(weather.wmoCode)}</div>
              <div class="weather-temps">
                <span class="temp-high">${weather.tempMax}°</span>
                <span class="temp-low">${weather.tempMin}°</span>
                <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Pirkkala</span>
              </div>
            </div>
            <div class="weather-details">
              <div class="w-detail">💧 ${weather.precipitationMm}mm</div>
              <div class="w-detail">💨 ${weather.windKph} km/h</div>
            </div>
          </div>
          ${hourlyHtml}
        </div>
      `;
    }

    function renderCalendar(calendar) {
      if (!calendar || calendar.error) {
        return `<div class="card"><h2>YOUR DAY</h2><div class="error-inline">📅 Calendar unavailable: ${calendar?.message || 'Unknown error'}</div></div>`;
      }
      
      let eventsHtml = '';
      if (calendar.length === 0) {
        eventsHtml = '<div class="empty-state">No events scheduled.</div>';
      } else {
        eventsHtml = `<ul>${calendar.map(ev => `
          <li>
            <div class="event">
              <div class="event-time">${ev.time}</div>
              <div class="event-details">
                <div class="event-title">${ev.title}</div>
                ${ev.durationMinutes ? `<div class="event-duration">${ev.durationMinutes} min</div>` : ''}
              </div>
            </div>
          </li>
        `).join('')}</ul>`;
      }

      return `
        <div class="card">
          <h2>YOUR DAY</h2>
          ${eventsHtml}
        </div>
      `;
    }

    function renderKids(kids) {
      if (!kids || kids.error) {
        return `<div class="card"><h2>WILMA</h2><div class="error-inline">🎒 Wilma unavailable: ${kids?.message || 'Unknown error'}</div></div>`;
      }

      if (kids.length === 0) {
        return '';
      }

      const kidsHtml = kids.map(kid => {
        const scheduleHtml = kid.schedule.length ? kid.schedule.map(s => `<span class="subject-tag">${s.time} ${s.subject}</span>`).join(' ') : '<span class="empty-state">None</span>';
        const hwHtml = kid.homework.length ? kid.homework.map(h => `<div class="data-item"><span><b>${h.subject}</b> — ${h.description}</span></div>`).join('') : '<span class="empty-state">None pending</span>';
        const examsHtml = kid.exams.length ? kid.exams.map(e => `<div class="data-item"><span><b>${e.subject}</b> on ${e.date}</span></div>`).join('') : '<span class="empty-state">No upcoming exams</span>';

        return `
          <div class="kid-block">
            <div class="kid-name">${kid.name.toUpperCase()}</div>
            <div class="data-row">
              <div class="data-label">Schedule</div>
              <div class="data-content" style="display:flex; flex-wrap:wrap; gap:6px;">${scheduleHtml}</div>
            </div>
            <div class="data-row">
              <div class="data-label">Homework</div>
              <div class="data-content">${hwHtml}</div>
            </div>
            <div class="data-row">
              <div class="data-label">Exams</div>
              <div class="data-content">${examsHtml}</div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="card">
          <h2>WILMA</h2>
          ${kidsHtml}
        </div>
      `;
    }

    function render(data) {
      document.getElementById('dateTitle').innerText = formatDateTitle(data.date);
      const content = document.getElementById('content');
      
      let html = '';
      config.widgetOrder.forEach(id => {
        if (id === 'weather') html += renderWeather(data.weather);
        if (id === 'calendar') html += renderCalendar(data.calendar);
        if (id === 'kids') html += renderKids(data.kids);
      });

      content.innerHTML = html;

      // Trigger reflow for animation
      content.style.animation = 'none';
      content.offsetHeight;
      content.style.animation = 'fadeIn 0.3s ease-out';
    }

    function showLoading() {
      document.getElementById('content').innerHTML = `
        <div class="card loading">
          <div class="spinner"></div>
          <div>Fetching the day...</div>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="card error-full">
          <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
          <div>${msg}</div>
          <button class="btn-retry" onclick="loadDay()">Retry</button>
        </div>
      `;
    }

    async function loadDay() {
      showLoading();
      document.getElementById('dateTitle').innerText = formatDateTitle(currentDate);
      
      const params = new URLSearchParams();
      params.set('date', currentDate);
      if (config.calendarIds.length) params.set('calendarIds', config.calendarIds.join(','));
      if (config.enabledStudents.length) params.set('students', config.enabledStudents.join(','));

      try {
        const res = await fetch(`/api/day?${params.toString()}`);
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        render(data);
      } catch (e) {
        showError('Failed to load data. Please check your connection or server logs.');
      }

      setupAutoRefresh();
    }

    function setupAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      
      const today = getToday();
      const tomorrow = getTomorrow();
      
      if (currentDate === today || currentDate === tomorrow) {
        refreshInterval = setInterval(loadDay, 30 * 60 * 1000);
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.error('ServiceWorker registration failed: ', err);
        });
      });
    }

    async function init() {
      console.log('Initializing Nextday UI...');
      try {
        // Run fetches in parallel
        await Promise.allSettled([
          fetchConfig(),
          fetchMeta()
        ]);
        console.log('Config and Meta loaded');
      } catch (e) {
        console.error('Init error:', e);
      }
      
      location.hash = currentDate;
      loadDay();
    }

    init();
  </script>
</body>
</html>
